services:
  db:
    image: pgvector/pgvector:pg16
    container_name: bhpilot-postgres
    environment:
      POSTGRES_USER: bhpilot
      POSTGRES_PASSWORD: bhpilot
      POSTGRES_DB: bhpilot
    ports:
      - "5432:5432"
    volumes:
      - bhpilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bhpilot -d bhpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bhpilot_pgdata:
